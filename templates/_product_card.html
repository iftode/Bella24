<div class="product-card">{% if p.is_promo %}<span class="badge">Promoție</span>{% endif %}<a href="{{ url_for('product_detail', pid=p.id) }}"><img src="{{ url_for('static', filename=p.image or 'images/products/placeholder.png') }}" onerror="this.src='https://via.placeholder.com/400x520?text=Bella24'"></a><small>{{p.category_name or 'Produs'}}</small><h3>{{p.name}}</h3><p>{{p.description[:90] if p.description else '' }}...</p><div class="price">{{'%.2f'|format(p.price)}} lei {% if p.old_price %}<del>{{'%.2f'|format(p.old_price)}} lei</del>{% endif %}</div><form method="post" action="{{ url_for('add_to_cart', pid=p.id) }}"><button class="btn full">Adaugă în coș</button></form></div>
