{% extends 'base.html' %}{% block content %}<section class="panel"><div class="row"><h1>Produse Admin</h1><a class="btn" href="{{ url_for('admin_product_form') }}">+ Adaugă produs</a></div><table><tr><th>Poza</th><th>Nume</th><th>Categorie</th><th>Preț</th><th>Activ</th><th>Acțiuni</th></tr>{% for p in products %}<tr><td><img class="table-img" src="{{ url_for('static', filename=p.image or 'images/products/placeholder.png') }}"></td><td>{{p.name}}</td><td>{{p.category_name}}</td><td>{{p.price}} lei</td><td>{{'Da' if p.is_active else 'Nu'}}</td><td><a href="{{ url_for('admin_product_form', pid=p.id) }}">Editează</a> | <a onclick="return confirm('Ștergi produsul?')" href="{{ url_for('admin_product_delete', pid=p.id) }}">Șterge</a></td></tr>{% endfor %}</table></section>{% endblock %}
